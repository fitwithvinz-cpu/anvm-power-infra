services:
  - type: web
    name: anvm-power-infra
    runtime: node
    plan: free
    buildCommand: "pnpm install && pnpm run build"
    startCommand: "pnpm run start"
    envVars:
      - key: NODE_ENV
        value: production
      - key: NODE_OPTIONS
        value: "--max-old-space-size=512"
    healthCheckPath: /
    autoDeploy: true
